name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Test with pytest
        env:
          LLM_PROVIDER: test
        run: |
          python -m pytest tests/ -v --timeout=60

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run --reporter=verbose
        continue-on-error: true

  deployment-check:
    name: Deployment Ready Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Validate render.yaml
        run: |
          python -c "
          import yaml
          with open('render.yaml') as f:
              config = yaml.safe_load(f)
          assert 'services' in config
          services = {s['name']: s['type'] for s in config['services']}
          assert 'pdf-quiz-generator-frontend' in services
          assert 'pdf-quiz-generator-backend' in services
          assert services['pdf-quiz-generator-frontend'] == 'static_site'
          assert services['pdf-quiz-generator-backend'] == 'web_service'
          print('✅ render.yaml is valid')
          "

      - name: Validate .env.example files
        run: |
          test -f backend/.env.example && echo '✅ backend/.env.example exists'
          test -f frontend/.env.example && echo '✅ frontend/.env.example exists'